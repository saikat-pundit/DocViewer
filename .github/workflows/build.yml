name: Android Release Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # ⚡ Explicitly caches Gradle dependencies
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    
    - name: Make Gradle Wrapper Executable
      run: chmod +x ./gradlew
    
    - name: Build Release APKs

      run: ./gradlew assembleRelease --build-cache --parallel
    
    - name: Create Release & Upload APKs
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag }}
        name: Release ${{ github.event.inputs.tag }}
        generate_release_notes: true
        draft: false
        prerelease: false
        # Points to the release output folder where your split APKs are generated
        files: app/build/outputs/apk/release/*.apk 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
