name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

# Required permission to create a GitHub Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # ⚡ Explicitly caches Gradle dependencies
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
        
    # REMOVE the 'Make Gradle Wrapper Executable' chmod step entirely
    
    - name: Build Release APKs
      # Use 'gradle' instead of './gradlew'
      run: gradle assembleRelease --build-cache --parallel
    
    - name: Create Release & Upload APKs
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag }}
        name: Release ${{ github.event.inputs.tag }}
        generate_release_notes: true
        draft: false
        prerelease: false
        files: app/build/outputs/apk/release/**/*.apk 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
